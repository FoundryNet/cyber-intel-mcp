name: "@foundrynet/cyber-intel-mcp"
displayName: "FoundryNet Cyber Intelligence"
description: >-
  CVE vulnerability search with EPSS exploit prediction, CISA KEV tracking, IP reputation checking, and GitHub advisory monitoring.
icon: "🛡️"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/cyber-intel-mcp"
license: "MIT"
categories:
  - security
  - data
  - devops
tags:
  - cve-search
  - vulnerability-database
  - threat-intelligence
  - epss
  - cisa-kev
  - security-scanning
  - ip-reputation
keywords:
  - cve-search
  - vulnerability-database
  - threat-intelligence
  - epss
  - cisa-kev
  - security-scanning
  - ip-reputation
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://cyber-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
